services:
  fuck-watermark:
    build:
      context: .
      dockerfile: Dockerfile
    image: fuck-watermark:latest
    container_name: fuck-watermark
    restart: unless-stopped
    ports:
      - "8080:9000"
    volumes:
      - ./config.toml:/app/config.toml:ro
    command: [ "-c", "/app/config.toml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
