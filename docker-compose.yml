services:
  fuck-watermark:
    image: ghcr.io/juhaozero/fuck-watermark:latest
    container_name: fuck-watermark
    restart: unless-stopped
    ports:
      - "9000:9000"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - fw-logs:/app/logs
    command: [ "-c", "/app/config.toml"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  fw-logs:
