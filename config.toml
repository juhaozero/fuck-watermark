[server]
addr = 9000
# HTTP 上游请求超时（秒）
request_timeout = 30


# 微博视频代理基址（可选，防 403），例如 "https://svproxy.example.com"
[weibo]

proxy_base = ""



[security]

api_key = ""
# CORS 允许来源，"*" 表示任意来源
allow_origins = ["*"]

max_body_bytes = 16384
# 请求体大小上限（字节）



[rate_limit]

enabled = true
# 是否启用按 IP 限流（仅作用于 /api/*）
requests_per_minute = 60
# 每分钟请求数
burst = 10
# 突发请求数
